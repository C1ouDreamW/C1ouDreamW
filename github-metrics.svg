<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title description">
  <title id="title">C1ouDreamW GitHub metrics</title>
  <desc id="description">Initial cached profile statistics. GitHub Actions replaces this panel with current metrics.</desc>
  <style>
    .panel { fill: #ffffff; stroke: #d0d7de; }
    .divider { stroke: #d8dee4; }
    .title { fill: #0969da; font: 700 19px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .eyebrow { fill: #57606a; font: 600 11px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1px; }
    .value { fill: #24292f; font: 700 34px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #57606a; font: 500 12px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .chip { fill: #ddf4ff; stroke: #b6e3ff; }
    .chip-text { fill: #0969da; font: 600 11px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .status { fill: #1a7f37; font: 600 11px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .status-dot { fill: #2da44e; }
    @media (prefers-color-scheme: dark) {
      .panel { fill: #0d1117; stroke: #30363d; }
      .divider { stroke: #30363d; }
      .title { fill: #58a6ff; }
      .eyebrow, .label { fill: #8c959f; }
      .value { fill: #f0f6fc; }
      .chip { fill: #111d2f; stroke: #1f6feb; }
      .chip-text { fill: #79c0ff; }
      .status { fill: #56d364; }
      .status-dot { fill: #3fb950; }
    }
  </style>

  <rect class="panel" x="0.5" y="0.5" width="899" height="299" rx="8"/>
  <text class="eyebrow" x="34" y="39">SYSTEM // GITHUB PROFILE</text>
  <text class="title" x="34" y="68">Developer Metrics Console</text>
  <circle class="status-dot" cx="746" cy="50" r="5"/>
  <text class="status" x="760" y="54">AUTOMATION READY</text>
  <line class="divider" x1="34" y1="91" x2="866" y2="91"/>

  <text class="value" x="64" y="151">34</text>
  <text class="label" x="64" y="174">PUBLIC REPOSITORIES</text>

  <text class="value" x="336" y="151">7</text>
  <text class="label" x="336" y="174">STARS EARNED</text>

  <text class="value" x="608" y="151">4</text>
  <text class="label" x="608" y="174">FEATURED PROJECTS</text>

  <line class="divider" x1="34" y1="202" x2="866" y2="202"/>
  <text class="eyebrow" x="34" y="232">PRIMARY TOOLCHAIN</text>

  <rect class="chip" x="188" y="214" width="76" height="28" rx="6"/>
  <text class="chip-text" x="226" y="232" text-anchor="middle">JAVA</text>
  <rect class="chip" x="276" y="214" width="84" height="28" rx="6"/>
  <text class="chip-text" x="318" y="232" text-anchor="middle">PYTHON</text>
  <rect class="chip" x="372" y="214" width="112" height="28" rx="6"/>
  <text class="chip-text" x="428" y="232" text-anchor="middle">TYPESCRIPT</text>
  <rect class="chip" x="496" y="214" width="82" height="28" rx="6"/>
  <text class="chip-text" x="537" y="232" text-anchor="middle">KOTLIN</text>

  <text class="label" x="34" y="276">Cached locally. Refreshed daily by GitHub Actions.</text>
</svg>
