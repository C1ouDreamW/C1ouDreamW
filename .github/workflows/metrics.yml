name: Profile Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  generate:
    name: Generate cached metrics
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Render and commit profile metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          # A scope-less classic PAT is enough for public profile data.
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: C1ouDreamW
          filename: github-metrics.svg
          output_action: commit
          output_condition: data-changed
          committer_message: "chore: update profile metrics [skip ci]"

          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          repositories_forks: no
          config_timezone: Asia/Shanghai
          config_display: columns
          config_animations: yes
          config_base64: yes
          config_order: base.header, isocalendar, languages, base.activity+community, base.repositories

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_other: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_threshold: 1%

          extras_css: |
            svg {
              background: transparent !important;
              color: #57606a !important;
              font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            }
            h1, h2 {
              color: #24292f !important;
              letter-spacing: 0 !important;
            }
            h1 {
              color: #0969da !important;
            }
            .field svg {
              fill: #57606a !important;
            }
            @media (prefers-color-scheme: dark) {
              svg {
                color: #8c959f !important;
              }
              h1, h2 {
                color: #f0f6fc !important;
              }
              h1 {
                color: #58a6ff !important;
              }
              .field svg {
                fill: #8c959f !important;
              }
              :root {
                --color-calendar-graph-day-bg: #161b22;
                --color-calendar-graph-day-L1-bg: #0e4429;
                --color-calendar-graph-day-L2-bg: #006d32;
                --color-calendar-graph-day-L3-bg: #26a641;
                --color-calendar-graph-day-L4-bg: #39d353;
              }
            }

          optimize: css, xml
          plugins_errors_fatal: yes
          retries: 3
          retries_delay: 120
          retries_output_action: 3
          retries_delay_output_action: 60
